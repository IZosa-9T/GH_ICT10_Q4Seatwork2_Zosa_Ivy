<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Style link. -->
    <link rel="stylesheet" type="text/css" href="style.css">

    <!-- Bootstrap link. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Fonts link. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Short+Stack&display=swap" rel="stylesheet">

    <!-- Pyscript. -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <title>SW2</title>

</head>
<body>
    
    <br><br><br>

    <div class="narrow">

        <div class="center shortstackfont">
            <h3>Grade 10 Classmates system</h3>

            <hr>
        
        </div>

        <div>
            
            <form class="justify">  
                <div class="row">
                    <!-- name -->
                    <div class="col-sm-2">
                        <p>name:</p>
                    </div>

                    <div class="col-sm-10">
                        <input type="text" id="input1">
                    </div>

                    <!-- section -->
                    <div class="col-sm-2">
                        <p>section:</p>
                    </div>

                    <div class="col-sm-10">
                        <input type="text" id="input2">
                    </div>

                    <!-- fav sub -->
                    <div class="col-sm-2">
                        <p>fav sub:</p>
                    </div>

                    <div class="col-sm-10">
                        <input type="text" id="input3">
                    </div>
                </div>
                <input type="button" py-click="Listclassmates" value="show list">
                <input type="button" py-click="ClassmateInfo" value="Add your data">
            </form>

            <br>

            <div class="center">
                <p id="notification1"></p>
            </div>
            
            <p id="output1"></p>
            
        </div>

        <br>
        
    </div>
    
    <py-script src="main.py"></py-script>

</body>
</html>
